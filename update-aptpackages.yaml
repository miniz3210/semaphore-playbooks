---
- name: Optimized System Maintenance
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Upgrade all packages with lock handling
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        lock_timeout: 300
      register: apt_result

    - name: Remove unused packages and purge configs
      ansible.builtin.apt:
        autoremove: yes
        purge: yes  # This works here with autoremove
      when: apt_result.changed 

    - name: Clear local repository of retrieved package files
      ansible.builtin.apt:
        autoclean: yes # This must be separate to avoid the error
      when: apt_result.changed

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
        get_checksum: no
      register: reboot_required_file

    - name: Reboot the server
      ansible.builtin.reboot:
        msg: "Rebooting to apply kernel updates"
        reboot_timeout: 300
      when: reboot_required_file.stat.exists
