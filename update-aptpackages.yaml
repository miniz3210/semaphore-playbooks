---
- name: Optimized System Maintenance
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Upgrade all packages with lock handling
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        # Wait up to 5 minutes if background updates are running
        lock_timeout: 300
      register: apt_result

    - name: Comprehensive disk cleanup
      ansible.builtin.apt:
        autoremove: yes
        purge: yes
        autoclean: yes
      # Only run if something actually changed to save time
      when: apt_result.changed 

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
        get_checksum: no
      register: reboot_required_file

    - name: Reboot the server
      ansible.builtin.reboot:
        msg: "Rebooting to apply kernel updates"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: uptime
      when: reboot_required_file.stat.exists
